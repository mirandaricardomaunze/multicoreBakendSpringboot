server.port=8080
spring.main.headless=true

# ─── PROD: PostgreSQL gerido externamente ─────────────────────────────
# As variáveis de ambiente são obrigatórias — não há defaults para evitar fugas.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# Pool HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# JPA/Hibernate — Flyway é dono do schema; Hibernate só VALIDA.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# H2 console nunca em prod
spring.h2.console.enabled=false

# Springdoc — manter desactivado em prod até haver autenticação para a UI.
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.phcpro=INFO
logging.level.org.hibernate.SQL=WARN
