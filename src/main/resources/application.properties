server.port=8080

# Run in GUI mode (disable headless)
spring.main.headless=false

# ─── DEV (default): H2 in-memory ───────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:phcprodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate (dev: Hibernate cria/actualiza schema sozinho).
# Hibernate detecta H2Dialect automaticamente, não declarar explicitamente.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway desactivado em dev (Hibernate trata do schema). Em prod ver application-prod.properties.
spring.flyway.enabled=false

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Para gerar V1__init.sql (apenas quando preciso), descomentar:
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
