name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn -B -ntp clean compile

      - name: Run tests
        run: mvn -B -ntp test

      - name: Package (skip tests — already ran)
        run: mvn -B -ntp -DskipTests package
